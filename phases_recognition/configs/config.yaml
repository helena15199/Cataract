root_dir: "/home/helena/experiments_cataract/"
experiment_name: "cataract_v1.0"

model:
  name: simple
  num_classes: 17
  backbone:
    name: resnet50
    freeze: false

dataset:
  train:
    params:
      root: "/home/helena/UCL_video_cataract/dataset_temporal/train/"
      max_side: 224
    loader_params:
      batch_size: 64
      shuffle: true
      num_workers: 8
    transforms:
      brightness:
        target: albumentations.RandomBrightnessContrast
        params:
          brightness_limit: 0.1
          contrast_limit: 0.1
          p: 0.1
      jitter:
        target: albumentations.ColorJitter
        params:
          brightness: 0.1
          contrast: 0.1
          saturation: 0.1
          hue: 0.1
          p: 0.1

  val:
    params:
      root: "/home/helena/UCL_video_cataract/dataset_temporal/val/"
      max_side: 224
    loader_params:
      batch_size: 128
      shuffle: false
      num_workers: 8

loss:
  target: losses.cataract_loss.CataractLoss
  params:
    label_smoothing: 0.0

optimizer:
  target: torch.optim.AdamW
  params:
    lr: 1e-4

lr_scheduler:
  target: utils.lr_scheduler.get_linear_warmup_lr_scheduler
  params:
    n_warmup_steps: 50

visualizer:
  row: 4
  col: 8
  num_batch_to_take: 2
  class_names: [
    "phase_0", "phase_1", "phase_2", "phase_3", "phase_4",
    "phase_5", "phase_6", "phase_7", "phase_8", "phase_9",
    "phase_10", "phase_11", "phase_12", "phase_13", "phase_14",
    "phase_15", "phase_16"
  ]

train:
  epochs: 50
  device: "cuda:0"
  use_amp: true
  max_norm: 1.0
  log_every_n_steps: 10
  val_every_n_epoch: 1
  log_image_every_n_epoch: 1